name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Check backend exists
        id: check
        run: test -f backend/pyproject.toml
        continue-on-error: true
        working-directory: .

      - name: Install uv
        if: steps.check.outcome == 'success'
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        if: steps.check.outcome == 'success'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.check.outcome == 'success'
        run: uv sync

      - name: Lint
        if: steps.check.outcome == 'success'
        run: uv run ruff check .

      - name: Format check
        if: steps.check.outcome == 'success'
        run: uv run ruff format --check .

      - name: Type check
        if: steps.check.outcome == 'success'
        run: uv run mypy .

      - name: Unit tests
        if: steps.check.outcome == 'success'
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Integration tests
        if: steps.check.outcome == 'success'
        run: uv run pytest tests/integration/ -v --tb=short

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - name: Check SDK exists
        id: check
        run: test -f sdk/package.json
        continue-on-error: true
        working-directory: .

      - name: Set up Node
        if: steps.check.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        if: steps.check.outcome == 'success'
        run: npm ci

      - name: Type check
        if: steps.check.outcome == 'success'
        run: npm run typecheck

      - name: Unit tests
        if: steps.check.outcome == 'success'
        run: npm test

      - name: Build
        if: steps.check.outcome == 'success'
        run: npm run build
