name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pqdb_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_ADDR: http://127.0.0.1:8200
        ports:
          - 8200:8200
        options: >-
          --health-cmd "vault status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pqdb_platform
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-root-token

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install liboqs native library
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.14.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short

      - name: E2E tests
        run: uv run pytest tests/e2e/ -v --tb=short

  security-gate:
    name: Deterministic Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep CI (SAST + Supply Chain)
        run: pip install semgrep && semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Secret scanning (gitleaks)
        run: gitleaks detect --source . --no-banner --exit-code 1

      - name: Test quality — no unconditional skips (Python)
        run: |
          echo "Checking for unconditional @pytest.mark.skip (not skipif)..."
          if grep -rn '@pytest\.mark\.skip\b' --include='*.py' backend/tests/ sdk/ 2>/dev/null | grep -v 'skipif' | grep -v 'skipIf'; then
            echo "❌ Found unconditional @pytest.mark.skip — tests must not be skipped"
            exit 1
          fi
          echo "✅ No unconditional skips found"

      - name: Test quality — no unconditional skips (TypeScript)
        run: |
          echo "Checking for xit/xdescribe/test.skip..."
          if grep -rn '\bxit\b\|xdescribe\b\|test\.skip\|it\.skip\|describe\.skip' --include='*.ts' --include='*.tsx' dashboard/src/ sdk/ 2>/dev/null; then
            echo "❌ Found skipped tests in TypeScript"
            exit 1
          fi
          echo "✅ No skipped TypeScript tests found"

      # Type-safety bypass checks (as any, # type: ignore) removed —
      # tsc --noEmit and mypy --strict already run in Backend/SDK CI jobs
      # and catch real type errors. Grep-based checks are too blunt for
      # legitimate uses in test fixtures (casting partial objects, testing
      # abstract classes, accessing dynamic attributes).

      - name: Test quality — no empty test bodies (Python)
        run: |
          echo "Checking for empty test functions (pass-only or ...)..."
          python3 -c "
          import re, sys, pathlib
          empty = re.compile(r'def test_\w+\([^)]*\):\s*\n\s+(pass|\.\.\.)\s*\n')
          found = False
          for f in pathlib.Path('backend/tests').rglob('test_*.py'):
              text = f.read_text()
              for m in empty.finditer(text):
                  print(f'❌ {f}:{text[:m.start()].count(chr(10))+1}: empty test body')
                  found = True
          sys.exit(1 if found else 0)
          "
          echo "✅ No empty test bodies found"

  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck -w sdk

      - name: Unit tests
        run: npm test -w sdk

      - name: Build
        run: npm run build -w sdk

  mcp:
    name: MCP (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      # The MCP workspace imports `@pqdb/client` from the sibling `sdk/`
      # workspace. The types live in `sdk/dist/` (built by tsup) and the
      # workspace symlink resolves there — NOT to `sdk/src/`. Without
      # this step, `tsc --noEmit` fails with TS2307 "Cannot find module
      # '@pqdb/client'" because the dist directory is empty on a fresh
      # CI checkout. Locally this step is implicit because devs run
      # `npm run build -w sdk` as part of normal work.
      - name: Build SDK (needed for MCP typecheck to resolve @pqdb/client)
        run: npm run build -w sdk

      - name: Type check
        run: npm run typecheck -w mcp

      - name: Unit tests
        run: npm test -w mcp

      - name: Build
        run: npm run build -w mcp

  mcp-e2e:
    name: MCP E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, sdk, mcp, security-gate]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pqdb_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_ADDR: http://127.0.0.1:8200
        ports:
          - 8200:8200
        options: >-
          --health-cmd "vault status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pqdb_platform
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-root-token

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install liboqs native library
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.14.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Run backend migrations
        run: cd backend && uv add --dev psycopg2-binary && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pqdb_platform

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build -w sdk

      - name: Start backend in background
        run: |
          cd backend
          uv run uvicorn pqdb_api.app:create_app --factory --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend did not become ready"
          cat /tmp/backend.log
          exit 1

      - name: MCP E2E tests (crypto proxy round-trip)
        run: npm run test:e2e -w mcp

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) 2>/dev/null || true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, sdk, security-gate]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pqdb_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_ADDR: http://127.0.0.1:8200
        ports:
          - 8200:8200
        options: >-
          --health-cmd "vault status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pqdb_platform
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-root-token

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install liboqs native library
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.14.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Run backend migrations
        run: cd backend && uv add --dev psycopg2-binary && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pqdb_platform

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build -w sdk

      - name: Run SDK E2E tests
        run: npm run test:e2e -w sdk
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pqdb_platform
          PQDB_VAULT_ADDR: http://localhost:8200
          PQDB_VAULT_TOKEN: dev-root-token
          PQDB_SUPERUSER_DSN: postgresql://postgres:postgres@localhost:5432/postgres

  dashboard-e2e:
    name: Dashboard E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, sdk, security-gate]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pqdb_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      vault:
        image: hashicorp/vault:1.15
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_ADDR: http://127.0.0.1:8200
        ports:
          - 8200:8200
        options: >-
          --health-cmd "vault status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pqdb_platform
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-root-token

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install liboqs native library
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 --branch 0.14.0 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && mkdir build && cd build
          cmake -GNinja -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install backend dependencies
        run: cd backend && uv sync

      - name: Run backend migrations
        run: cd backend && uv add --dev psycopg2-binary && uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pqdb_platform

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install workspace dependencies and build SDK
        run: npm ci && npm run build -w sdk

      - name: Install Dashboard dependencies
        run: cd dashboard && npm ci

      - name: Install Playwright Chromium
        run: cd dashboard && npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: cd dashboard && npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/test-results/
          retention-days: 7
