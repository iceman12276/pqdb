services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pqdb

  vault:
    image: hashicorp/vault:1.15
    env_file: ../.env
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pqdb

  vault-init:
    image: hashicorp/vault:1.15
    env_file: ../.env
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-dev-root-token}
    volumes:
      - ./init-scripts/init-vault.sh:/init-vault.sh:ro
    entrypoint: ["/bin/sh", "/init-vault.sh"]
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - pqdb
    restart: "no"

volumes:
  pgdata:

networks:
  pqdb:
    driver: bridge
